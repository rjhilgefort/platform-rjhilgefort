name: Budget Time - E2E Tests

on:
  pull_request:
    paths:
      - 'apps/budget-time/**'

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: budgettime_dev
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/budget-time

      - name: Push DB schema
        run: npx drizzle-kit push
        working-directory: apps/budget-time
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/budgettime_dev

      - name: Seed test data
        run: npx tsx db/seed.ts
        working-directory: apps/budget-time
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/budgettime_dev

      - name: Run E2E tests
        run: npx playwright test --reporter=list
        working-directory: apps/budget-time
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/budgettime_dev
          FAMILY_PIN: '1234'
          PARENT_PIN: '5678'
          COOKIE_SECURE: 'false'
          CI: 'true'

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/budget-time/playwright-report/
          retention-days: 7
